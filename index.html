<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OptimaSeek AI</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f7fb;
  color:#222;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

#ipt{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
  box-sizing:border-box;
}

#inspire-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:30px;
}

.ip-card{
  position:relative;
  overflow:hidden;
  border-radius:18px;
  min-height:240px;
  background:#eee;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.ip-card:hover{
  transform:translateY(-5px);
}

.ip-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.ip-card-label{
  position:absolute;
  left:10px;
</html>
