<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>OptimaSeek AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ==================== IMPROVED MOBILE + CHATGPT STYLE ==================== */
html, body {
  width: 100%;
  height: 100dvh;
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: Inter, system-ui, sans-serif;
  background: #fff;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  overflow: hidden;
}

.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 120px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 780px;
  width: 100%;
  margin: 0 auto;
}

.bottom {
  position: sticky;
  bottom: 0;
  background: white;
  border-top: 1px solid #e5e7eb;
  padding: 12px 16px 20px;
  z-index: 10;
}

.input-wrap {
  max-width: 780px;
  width: 100%;
  margin: 0 auto;
  background: white;
  border: 1px solid #d1d5db;
  border-radius: 20px;
  padding: 8px 12px;
  box-shadow: 0 4px 25px rgba(0,0,0,0.08);
}

textarea {
  font-size: 16px !important;
  line-height: 1.5;
}

.bubble {
  padding: 14px 18px;
  border-radius: 18px;
  font-size: 15.5px;
  line-height: 1.6;
  max-width: 85%;
  word-break: break-word;
}

.user .bubble {
  background: #0d0d0d;
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 6px;
}

.bot .bubble {
  background: #f1f1f1;
  color: #111;
  align-self: flex-start;
  border-bottom-left-radius: 6px;
}

/* Mobile */
@media(max-width: 768px) {
  .chat { padding: 16px 12px 140px; }
  .bubble { max-width: 92%; }
  .sidebar { display: none; }
}
</style>
</head>
