<html lang="en">
<head>
<meta charset="UTF-8">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#fff;
color:#111827;
height:100vh;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#fafafa;
border-right:1px solid #e5e7eb;
display:flex;
flex-direction:column;
padding:14px;
gap:8px;
}

.logo{
display:flex;

padding:10px;
}

.logo-spin{

height:28px;
border-radius:50%;
border:3px solid #111827;
border-top-color:transparent;
animation:spin 3s linear infinite;
}

@keyframes spin{
to{
transform:rotate(360deg);
}
}

.side-btn{
height:46px;
border:none;
background:#fff;
border:1px solid #e5e7eb;

padding:0 14px;
transition:.2s;
}

.side-btn:hover{

}

.sidebar-bottom{

display:flex;

}

.main{

display:flex;
flex-direction:column;

}

/* TOPBAR */

.topbar{
height:64px;
display:flex;
align-items:center;
justify-content:flex-end;
padding:0 20px;
gap:10px;

}

.login{
height:40px;
padding:0 18px;
border:none;
background:#111827;
color:white;
border-radius:999px;
font-weight:600;

}

.signup{

padding:0 18px;

border-radius:999px;

}

/* CHAT */

.chat{

}

.user .bubble{

}

.bot .bubble{

.bottom{

}

.bot .bubble p{

.sidebar{
display:none;
}

.bottom{
left:0;
}

.welcome h1{

}

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
<div class="logo-spin"></div>
<div>OptimaSeek</div>
</div>

<button class="side-btn" onclick="newChat()">
➕ New Chat
</button>

<button class="side-btn">
🔍 Search Chats
</button>

<button class="side-btn">
🖼️ Images
</button>

<div class="sidebar-bottom">

<button class="side-btn">
💎 Plans & Pricing
</button>

<button class="side-btn">
⚙️ Settings
</button>

<button class="side-btn">
❓ Help
</button>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<button class="login" onclick="openModal()">
Log in
</button>

<button class="signup" onclick="openModal()">
Sign up for free
</button>

</div>

<div class="chat" id="chat">

<div class="welcome" id="welcome">
<h1>What are you working on?</h1>
<p>Powered by Claude AI</p>
</div>

</div>

<!-- INPUT -->

<div class="bottom">

<div class="input-wrap">

<div class="input-top">

<textarea
id="input"
placeholder="Ask anything"
></textarea>

</div>

<div class="actions">

<div class="left-actions">

<button class="icon-btn">
📎 Add files
</button>

<button class="icon-btn">
🎤 Voice
</button>

<button class="icon-btn">
💻 Code
</button>

</div>

<button class="send" onclick="sendMessage()">
↑
</button>

</div>

</div>

</div>

</div>

<!-- LOGIN MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<h2>Welcome back</h2>

<input type="email" placeholder="Email address">

<input type="password" placeholder="Password">

<button>
Continue
</button>

<button class="google">
Continue with Google
</button>

</div>

</div>

<script>

const API_URL =
"https://optimaseek.vercel.app/api/chat";

const input =
document.getElementById("input");

input.addEventListener(
"keydown",
function(e){

if(
e.key==="Enter" &&
!e.shiftKey
){
e.preventDefault();
sendMessage();
}

}
);

input.addEventListener(
"input",
function(){

input.style.height="auto";

input.style.height =
Math.min(
input.scrollHeight,
160
)+"px";

}
);

function openModal(){

document.getElementById(
"modal"
).style.display="flex";

}

window.onclick=function(e){

if(e.target.id==="modal"){

document.getElementById(
"modal"
).style.display="none";

}

}

async function sendMessage(){

const text=input.value.trim();

if(!text)return;

document.getElementById(
"welcome"
).style.display="none";

addMessage(text,"user");

input.value="";
input.style.height="40px";

const thinking =
addMessage("Thinking...","bot");

try{

const response =
await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

const data =
await response.json();

thinking.querySelector(
".bubble"
).innerHTML =
marked.parse(data.reply);

}catch(err){

thinking.querySelector(
".bubble"
).innerHTML =
"Error connecting to AI.";

}

}

function addMessage(text,type){

const chat =
document.getElementById("chat");

const div =
document.createElement("div");

div.className =
`msg ${type}`;

div.innerHTML =
`<div class="bubble">${text}</div>`;

chat.appendChild(div);

chat.scrollTop =
chat.scrollHeight;

return div;

}

function newChat(){

document.getElementById(
"chat"
).innerHTML=`
<div class="welcome" id="welcome">
<h1>What are you working on?</h1>
<p>Powered by Claude AI</p>
</div>
`;

}

</script>

</body>
</html>
