<style>

*{

<body>

<div class="sidebar">
<div class="logo">OptimaSeek AI</div>

<button class="new-chat" onclick="newChat()">
+ New Chat
</button>
</div>

<div class="main">

<div class="topbar">
<div>AI Assistant</div>

<button class="auth-btn" onclick="openModal()">
Sign In
</button>
</div>

<div class="chat" id="chat">

<div class="welcome" id="welcome">
<h1>How can I help you today?</h1>
<p>Powered by Claude AI</p>
</div>

</div>

<div class="bottom">
<div class="input-wrap">

<textarea
id="input"
placeholder="Message OptimaSeek AI..."
></textarea>

<button class="send" onclick="sendMessage()">
↑
</button>

</div>
</div>

</div>

<div class="modal" id="modal">

<div class="modal-box">

<h2>Sign in</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signIn()">
Continue
</button>

<button class="google" onclick="googleSignIn()">
Continue with Google
</button>

</div>

</div>

<script>

const API_URL = "https://optimaseek.vercel.app/api/chat";
function openModal(){
document.getElementById("modal").style.display="flex";
}

window.onclick=function(e){
if(e.target.id==="modal"){
document.getElementById("modal").style.display="none";
}
}

async function sendMessage(){

const input=document.getElementById("input");
const text=input.value.trim();

if(!text)return;

document.getElementById("welcome").style.display="none";

addMessage(text,"user");

input.value="";

const responseDiv=addMessage("Thinking...","bot");

try{

const response=await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

const data=await response.json();

responseDiv.querySelector(".bubble").innerHTML=data.reply;

}catch(err){

responseDiv.querySelector(".bubble").innerHTML=
"Error connecting to AI.";

}

}

function addMessage(text,type){

const chat=document.getElementById("chat");

const div=document.createElement("div");

div.className=`msg ${type}`;

div.innerHTML=
`<div class="bubble">${text}</div>`;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

return div;
}

function newChat(){
document.getElementById("chat").innerHTML=`
<div class="welcome" id="welcome">
<h1>How can I help you today?</h1>
<p>Powered by Claude AI</p>
</div>
`;
}

</script>

</body>
</html>
