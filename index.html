<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptimaSeek AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ==================== MOBILE FIXES ==================== */
html, body {
  width: 100%;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

.chat {
  padding-bottom: 140px;
}

.bottom {
  position: sticky;
  bottom: 0;
  z-index: 20;
  background: white;
}

textarea {
  font-size: 16px;
}

.bubble {
  max-width: 100%;
  word-break: break-word;
}

@media(max-width: 768px) {
  .chat {
    padding: 16px;
    gap: 18px;
  }

  .bubble {
    max-width: 92%;
    font-size: 15px;
    line-height: 1.6;
  }

  .welcome h1 {
    font-size: 28px;
  }

  .input-wrap {
    border-radius: 20px;
  }

  .sidebar {
    display: none;
  }

  .topbar {
    padding: 10px;
  }
}

/* ==================== ORIGINAL STYLES ==================== */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Inter,sans-serif;background:#fff;color:#0d0d0d;min-height:100dvh;display:flex;overflow:hidden;}
.sidebar{width:260px;background:#f9f9f9;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;padding:10px;gap:4px;}
.logo{display:flex;align-items:center;gap:10px;padding:12px 10px;font-size:17px;font-weight:700;cursor:pointer;}
.logo-icon{width:32px;height:32px;background:#0d0d0d;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:700;flex-shrink:0;}
.side-btn{height:40px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;text-align:left;padding:0 12px;color:#0d0d0d;transition:.15s;display:flex;align-items:center;gap:10px;width:100%;}
.side-btn:hover{background:#ececec;}
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;gap:4px;border-top:1px solid #e5e7eb;padding-top:10px;}
.main{flex:1;display:flex;flex-direction:column;min-height:100dvh;overflow:hidden;}
.topbar{height:56px;display:flex;align-items:center;justify-content:flex-end;padding:0 16px;gap:8px;flex-shrink:0;}
.login-btn{height:36px;padding:0 16px;border:none;background:#0d0d0d;color:white;border-radius:999px;font-weight:600;font-size:14px;cursor:pointer;}
.signup-btn{height:36px;padding:0 16px;border:1px solid #d1d5db;background:white;border-radius:999px;font-weight:600;font-size:14px;cursor:pointer;}
.page{flex:1;overflow-y:auto;display:none;flex-direction:column;}
.page.active{display:flex;}
.chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat{flex:1;overflow-y:auto;padding:20px 20px 20px;display:flex;flex-direction:column;gap:24px;max-width:760px;width:100%;margin:auto;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;min-height:300px;}
.welcome h1{font-size:36px;font-weight:600;margin-bottom:8px;}
.welcome p{color:#6b7280;font-size:15px;}
.msg{display:flex;flex-direction:column;gap:4px;}
.user{align-items:flex-end;}
.bot{align-items:flex-start;}
.bubble{padding:14px 18px;border-radius:18px;font-size:15px;line-height:1.75;max-width:85%;}
.user .bubble{background:#0d0d0d;color:white;}
.bot .bubble{background:#f3f4f6;color:#0d0d0d;}
.bottom{padding:12px 24px 20px;background:white;border-top:1px solid #f3f4f6;flex-shrink:0;display:flex;flex-direction:column;align-items:center;}
.msg-count{text-align:center;font-size:13px;color:#6b7280;margin-bottom:8px;width:100%;max-width:760px;}
.input-wrap{max-width:760px;width:100%;background:white;border:1px solid #d1d5db;border-radius:16px;padding:12px 12px 8px 16px;box-shadow:0 4px 20px rgba(0,0,0,.06);}
.input-top{display:flex;align-items:flex-end;gap:8px;}
textarea{flex:1;border:none;outline:none;resize:none;font-size:15px;font-family:Inter,sans-serif;min-height:36px;max-height:160px;padding:4px 0;background:transparent;}
.send{width:36px;height:36px;border:none;background:#0d0d0d;color:white;border-radius:10px;cursor:pointer;font-size:16px;flex-shrink:0;}
.send:disabled{background:#d1d5db;cursor:not-allowed;}
.input-bottom{display:flex;align-items:center;margin-top:8px;gap:6px;flex-wrap:wrap;}
.action-btn{height:32px;padding:0 12px;border:none;background:#f3f4f6;border-radius:999px;cursor:pointer;font-size:13px;font-weight:500;color:#374151;display:flex;align-items:center;gap:6px;}
.action-btn:hover{background:#e5e7eb;}
.pricing-page{padding:40px 20px;max-width:1100px;margin:auto;width:100%;}
.pricing-page h1{text-align:center;font-size:32px;font-weight:700;margin-bottom:8px;}
.pricing-page>p{text-align:center;color:#6b7280;margin-bottom:40px;}
.plans{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.plan{border:1px solid #e5e7eb;border-radius:16px;padding:24px;display:flex;flex-direction:column;gap:12px;position:relative;}
.plan.popular{border:2px solid #0d0d0d;}
.plan-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:#0d0d0d;color:white;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap;}
.plan-name{font-size:18px;font-weight:700;}
.plan-price{font-size:30px;font-weight:700;line-height:1.2;}
.plan-price span{font-size:12px;font-weight:400;color:#6b7280;}
.plan-desc{font-size:13px;color:#6b7280;min-height:36px;}
.plan-btn{height:44px;border:none;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;margin-top:8px;}
.plan-btn.dark{background:#0d0d0d;color:white;}
.plan-btn.light{background:#f3f4f6;color:#0d0d0d;border:1px solid #e5e7eb;}
.plan-features{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.plan-features li{font-size:13px;color:#374151;display:flex;align-items:flex-start;gap:8px;}
.plan-features li::before{content:"✓";color:#10b981;font-weight:700;flex-shrink:0;}
.login-page{display:flex;align-items:center;justify-content:center;flex:1;padding:20px;}
.login-box{width:100%;max-width:360px;padding:40px;border:1px solid #e5e7eb;border-radius:20px;}
.login-box h2{font-size:28px;font-weight:700;margin-bottom:6px;}
.login-box p{color:#6b7280;font-size:14px;margin-bottom:24px;}
.login-box input{width:100%;height:48px;border:1px solid #d1d5db;border-radius:10px;padding:0 14px;margin-bottom:12px;font-size:15px;outline:none;font-family:Inter,sans-serif;}
.login-box input:focus{border-color:#0d0d0d;}
.lbtn{width:100%;height:48px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;font-family:Inter,sans-serif;}
.lbtn.dark{background:#0d0d0d;color:white;}
.lbtn.google{background:white;color:#0d0d0d;border:1px solid #d1d5db;display:flex;align-items:center;justify-content:center;gap:10px;}
.lbtn.google:hover{background:#f9f9f9;}
.divider{text-align:center;color:#9ca3af;font-size:13px;margin:8px 0;}
.switch{text-align:center;font-size:14px;color:#6b7280;margin-top:16px;}
.switch a{color:#0d0d0d;font-weight:600;cursor:pointer;text-decoration:underline;}
.user-bar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f3f4f6;border-radius:10px;}
.user-avatar{width:32px;height:32px;border-radius:50%;background:#0d0d0d;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
.user-name{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.logout-btn{font-size:12px;color:#6b7280;cursor:pointer;border:none;background:none;flex-shrink:0;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;}
.modal.active{display:flex;}
.modal-box{background:white;border-radius:20px;padding:32px;max-width:480px;width:90%;}
.modal-box h2{font-size:24px;font-weight:700;margin-bottom:12px;text-align:center;}
.modal-box p{color:#6b7280;margin-bottom:24px;font-size:15px;text-align:center;}
.mbtn{height:48px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-bottom:10px;font-family:Inter,sans-serif;}
.mbtn.dark{background:#0d0d0d;color:white;}
.mbtn.light{background:#f3f4f6;color:#0d0d0d;}
.img-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:300;}
.img-modal.active{display:flex;}
.img-modal-box{background:white;border-radius:20px;padding:28px;max-width:480px;width:90%;}
.img-modal-box h2{font-size:22px;font-weight:700;margin-bottom:16px;}
.img-modal-box input{width:100%;height:48px;border:1px solid #d1d5db;border-radius:10px;padding:0 14px;margin-bottom:12px;font-size:15px;outline:none;font-family:Inter,sans-serif;}
.img-modal-box input:focus{border-color:#0d0d0d;}
.help-page{padding:40px 20px;max-width:760px;margin:auto;width:100%;}
.help-page h1{font-size:28px;font-weight:700;margin-bottom:8px;}
.help-page>p{color:#6b7280;margin-bottom:32px;}
.help-item{border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:16px;}
.help-item h3{font-size:16px;font-weight:600;margin-bottom:8px;}
.help-item p{color:#374151;font-size:14px;margin:0;line-height:1.6;}
.bot .bubble p{margin-bottom:12px;}
.bot .bubble ul,.bot .bubble ol{padding-left:20px;margin-bottom:12px;}
.bot .bubble li{margin-bottom:6px;}
.bot .bubble strong{font-weight:600;}
.bot .bubble h1,.bot .bubble h2,.bot .bubble h3{margin:16px 0 8px;font-weight:600;}
.bot .bubble code{background:#e5e7eb;padding:2px 6px;border-radius:4px;font-size:13px;}
.bot .bubble pre{background:#0d0d0d;color:white;padding:14px;border-radius:10px;overflow:auto;margin:12px 0;}
.file-preview{background:#f3f4f6;border-radius:10px;padding:10px 14px;font-size:13px;color:#374151;display:flex;align-items:center;gap:8px;max-width:760px;width:100%;margin:0 auto 8px;}
.file-preview span{flex:1;}
.file-preview button{border:none;background:none;cursor:pointer;color:#6b7280;font-size:16px;}
.img-preview{max-width:200px;border-radius:10px;margin-top:8px;}
.generated-img{max-width:100%;border-radius:12px;margin-top:8px;cursor:pointer;}
@media(max-width:900px){.plans{grid-template-columns:1fr 1fr;}}
@media(max-width:500px){.plans{grid-template-columns:1fr;}}
</style>
</head>
<body>
