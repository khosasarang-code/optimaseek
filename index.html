<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptimaSeek AI</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#ffffff;
height:100vh;
display:flex;
color:#111827;
}

.sidebar{
width:260px;
border-right:1px solid #e5e7eb;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
background:#fafafa;
}

.logo{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.new-chat{
height:44px;
border:none;
background:#111827;
color:white;
border-radius:12px;
font-size:14px;
font-weight:600;
cursor:pointer;
}

.main{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

.topbar{
height:64px;
border-bottom:1px solid #e5e7eb;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
}

.auth-btn{
height:40px;
padding:0 18px;
border:none;
background:#111827;
color:white;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.chat{
flex:1;
overflow-y:auto;
padding:40px 20px;
display:flex;
flex-direction:column;
gap:20px;
max-width:900px;
width:100%;
margin:auto;
}

.welcome{
text-align:center;
margin-top:120px;
}

.welcome h1{
font-size:40px;
margin-bottom:10px;
}

.welcome p{
color:#6b7280;
}

.msg{
display:flex;
flex-direction:column;
gap:8px;
}

.user{
align-items:flex-end;
}

.bot{
align-items:flex-start;
}

.bubble{
padding:16px;
border-radius:16px;
max-width:80%;
line-height:1.7;
font-size:15px;
}

.user .bubble{
background:#111827;
color:white;
}

.bot .bubble{
background:#f3f4f6;
}

.bottom{
padding:20px;
border-top:1px solid #e5e7eb;
}

.input-wrap{
max-width:900px;
margin:auto;
display:flex;
gap:10px;
}

textarea{
flex:1;
height:56px;
border:1px solid #d1d5db;
border-radius:14px;
padding:16px;
font-size:15px;
resize:none;
outline:none;
font-family:Inter,sans-serif;
}

.send{
width:56px;
border:none;
background:#111827;
color:white;
border-radius:14px;
font-size:18px;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
width:380px;
background:white;
padding:30px;
border-radius:20px;
}

.modal-box h2{
margin-bottom:20px;
}

.modal-box input{
width:100%;
height:48px;
border:1px solid #d1d5db;
border-radius:10px;
padding:0 14px;
margin-bottom:12px;
}

.modal-box button{
width:100%;
height:48px;
border:none;
background:#111827;
color:white;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.google{
margin-top:10px;
background:#f3f4f6 !important;
color:#111827 !important;
}

.bot .bubble h1,.bot .bubble h2,.bot .bubble h3{margin-top:18px;margin-bottom:10px;font-weight:700;}
.bot .bubble h1{font-size:28px;}
.bot .bubble h2{font-size:22px;}
.bot .bubble h3{font-size:18px;}
.bot .bubble p{margin-bottom:14px;line-height:1.8;}
.bot .bubble ul,.bot .bubble ol{padding-left:24px;margin-bottom:16px;}
.bot .bubble li{margin-bottom:8px;line-height:1.7;}
.bot .bubble strong{font-weight:700;color:#111827;}
.bot .bubble code{background:#e5e7eb;padding:2px 6px;border-radius:6px;font-size:14px;}
.bot .bubble pre{background:#111827;color:white;padding:16px;border-radius:12px;overflow:auto;margin:14px 0;}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">OptimaSeek AI</div>
<button class="new-chat" onclick="newChat()">+ New Chat</button>
</div>

<div class="main">

<div class="topbar">
<div>AI Assistant</div>
<button class="auth-btn" onclick="openModal()">Sign In</button>
</div>

<div class="chat" id="chat">
<div class="welcome" id="welcome">
<h1>How can I help you today?</h1>
<p>Powered by Claude AI</p>
</div>
</div>

<div class="bottom">
<div class="input-wrap">
<textarea id="input" placeholder="Message OptimaSeek AI..."></textarea>
<button class="send" onclick="sendMessage()">↑</button>
</div>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-box">
<h2>Sign in</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="signIn()">Continue</button>
<button class="google" onclick="googleSignIn()">Continue with Google</button>
</div>
</div>

<script>

const API_URL = "https://optimaseek.vercel.app/api/ch
