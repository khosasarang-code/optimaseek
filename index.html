<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OptimaSeek AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  color: #222;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

#ipt {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ccc;
  font-size: 16px;
  box-sizing: border-box;
}

#inspire-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.ip-card {
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  min-height: 240px;
  background: #eee;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.ip-card:hover {
  transform: translateY(-5px);
}

.ip-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.ip-card-label {
  position: absolute;
  left: 12px;
  bottom: 12px;
  background: rgba(0,0,0,0.65);
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: bold;
}

.no-results {
  display: none;
  text-align: center;
  margin-top: 30px;
  color: #666;
}
</style>
</head>

<body>
  <div class="container">
    <h1>OptimaSeek AI</h1>

    <input id="ipt" type="text" placeholder="Search inspiration..." />

    <div id="inspire-grid">
      <div class="ip-card" data-title="AI Website Builder">
        <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=800" alt="AI Website Builder">
        <div class="ip-card-label">AI Website Builder</div>
      </div>

      <div class="ip-card" data-title="Business Automation">
        <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=800" alt="Business Automation">
        <div class="ip-card-label">Business Automation</div>
      </div>

      <div class="ip-card" data-title="Smart Search">
        <img src="https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=800" alt="Smart Search">
        <div class="ip-card-label">Smart Search</div>
      </div>

      <div class="ip-card" data-title="Digital Marketing">
        <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800" alt="Digital Marketing">
        <div class="ip-card-label">Digital Marketing</div>
      </div>
    </div>

    <p class="no-results" id="noResults">No results found.</p>
  </div>

<script>
const input = document.getElementById("ipt");
const cards = document.querySelectorAll(".ip-card");
const noResults = document.getElementById("noResults");

input.addEventListener("input", () => {
  const query = input.value.toLowerCase().trim();
  let visibleCount = 0;

  cards.forEach(card => {
    const title = card.dataset.title.toLowerCase();
    const match = title.includes(query);

    card.style.display = match ? "block" : "none";

    if (match) visibleCount++;
  });

  noResults.style.display = visibleCount === 0 ? "block" : "none";
});
</script>
</body>
</html>
