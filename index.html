  var currentUser = null;

  // Simulate login
  function simulateUpgrade() {
    // Set user as upgraded
    currentUser.upgraded = true;
    applyUser(currentUser);
    alert('Simulated upgrade: Unlimited access enabled.');
  }

  // Initialize user
  function checkLogin() {
    // for demo: start as non-upgraded user
    currentUser = { name: 'Guest', email: 'guest@example.com', upgraded: false };
    applyUser(currentUser);
    updateBanner();
  }

  function applyUser(user) {
    // Save user info
    currentUser = {...user};
    // Show user name
    document.querySelector('#topbar-auth').innerHTML = 
      '<div style="display:flex;align-items:center;gap:10px">' +
      '<span style="font-size:13px;color:var(--sub)">'+user.name+'</span>' +
      (user.picture ? '<img src="'+user.picture+'" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border)"/>' 
      : '<div class="logo-dot">'+user.name[0].toUpperCase()+'</div>') +
      '<button class="btn btn-outline" style="padding:6px 12px;font-size:13px" onclick="logout()">Log out</button></div>';

    // Hide or show limits based on upgrade
    if(user.upgraded){
      document.getElementById('limit-bar').style.display='none';
    } else {
      document.getElementById('limit-bar').style.display='flex';
    }
    updateBanner();
  }

  function logout() {
    currentUser = { name:'Guest', email:'guest@example.com', upgraded:false };
    document.querySelector('#topbar-auth').innerHTML = 
      '<button class="btn btn-primary" onclick="openModal()">Log in</button>' +
      '<button class="btn btn-outline" onclick="openModal()">Sign up for free</button>';
    localStorage.removeItem('os_n');
    localStorage.removeItem('img_count');
    updateBanner();
  }

  // Check if user can search
  function canSearch() {
    if (currentUser.upgraded) return true;
    return getCount() < 8;
  }
  function bumpCount() {
    try {
      let n = getCount() + 1;
      localStorage.setItem('os_n', n);
      return n;
    } catch(e) { return 1; }
  }

  // Check if can generate image
  function canGenerateImage() {
    if(currentUser.upgraded) return true;
    let count = parseInt(localStorage.getItem('img_count') || '0');
    return count < 3;
  }
  function bumpImageCount() {
    try {
      let count = parseInt(localStorage.getItem('img_count') || '0') + 1;
      localStorage.setItem('img_count', count);
      return count;
    } catch(e) { return 1; }
  }

  // Update banner
  function updateBanner() {
    var banner = document.getElementById('limit-bar');
    if (currentUser.upgraded) {
      banner.style.display='none';
    } else {
      var n = getCount();
      document.getElementById('used-count').textContent = n;
      if (n >= 8) {
        banner.style.display='flex';
        banner.querySelector('button').disabled=true;
      } else {
        banner.style.display='flex';
        banner.querySelector('button').disabled=false;
      }
    }
  }

  // Send message with limit check
  async function sendText(text) {
    if (!canSearch()) {
      enterChat();
      addMsg('ai','You have used all **8 free searches**. Please upgrade to continue.');
      setTimeout(()=>showPage('pricing'), 1500);
      return;
    }
    bumpCount();
    updateBanner();

    // Your existing chat logic...
    addMsg('user', text);
    setTimeout(()=>addMsg('ai', 'Sample response for: ' + text), 1000);
  }

  // Generate image with limit check
  async function generateImage() {
    if (!canGenerateImage()) {
      alert("You have used all 3 free image generations. Please upgrade for unlimited.");
      return;
    }
    bumpImageCount();
    alert("Generating image (simulated)...");
    // Your actual image generation code...
  }

  // DOM load
  document.addEventListener('DOMContentLoaded', () => {
    checkLogin();
  });
</script>
