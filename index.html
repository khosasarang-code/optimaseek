<script>
/* ═══ STATE ═══ */
let convs=[],busy=false,mode='chat';
let attachedImg=null;
let selModel='flux';
let user=JSON.parse(localStorage.getItem('os_user')||'null');
let chatCount=parseInt(localStorage.getItem('os_cc')||'0');
let imgCount=parseInt(localStorage.getItem('os_ic')||'0');
const FREE_CHAT=6,FREE_IMG=6;

const INSPIRE=[
  {prompt:'Improve Your Desk Setup, minimalist home office, natural light, plants',label:'Improve Your Desk Setup',bg:'#e8f4f0'},
  {prompt:'Wanderlust, cinematic travel photography, golden hour, mountains',label:'Wanderlust',bg:'#f4e8e8'},
  {prompt:'Scribble art, two characters dancing, illustrated, fun cartoon style',label:'Scribble',bg:'#e8e8f4'},
  {prompt:'Chibi stickers, cute puppy and baby, hearts, kawaii style',label:'Chibi stickers',bg:'#f4f0e8'},
  {prompt:'Makeup guide, beauty editorial, elegant lighting, professional photography',label:'Makeup guide',bg:'#f0e8f4'},
  {prompt:'Futuristic city skyline at night, neon lights, cyberpunk, 8K',label:'Cyberpunk City',bg:'#e8f0f4'},
];

/* ═══ INIT ═══ */
window.onload=()=>{
  resetDaily();
  updateUI();
  updSend();
  buildInspire();
  renderHist();
};

/* ... [All other functions remain the same] ... */

/* ═══ IMAGE GENERATION ═══ */
function buildInspire(){
  const grid=document.getElementById('inspire-grid');
  INSPIRE.forEach(item=>{
    const card=document.createElement('div');
    card.className='ip-card';
    card.style.background=item.bg;
    card.style.display='flex';card.style.alignItems='center';card.style.justifyContent='center';
    card.innerHTML=`<div class="ip-card-label">${item.label}</div><div class="ip-card-over"><button class="ic-btn" onclick="usePrompt('${esc(item.prompt)}')">✨ Create this</button></div>`;
    
    const spin=document.createElement('div');
    spin.style.cssText='font-size:32px;';
    spin.textContent=['🏠','✈️','🎨','🐾','💄','🌆'][INSPIRE.indexOf(item)];
    card.prepend(spin);
    grid.appendChild(card);

    // Try loading a real image
    const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(item.prompt)}?width=400&height=400&model=flux&seed=${INSPIRE.indexOf(item)*777}&nologo=true`;
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{
      card.innerHTML='';
      card.appendChild(img);
      img.style.cssText='width:100%;height:100%;object-fit:cover;display:block;';
      
      const lbl=document.createElement('div');
      lbl.className='ip-card-label';
      lbl.textContent=item.label;
      card.appendChild(lbl);

      const ov=document.createElement('div');
      ov.className='ip-card-over';

      // === FIXED SECTION ===
      const safePrompt = item.prompt.replace(/'/g, "\\'");
      ov.innerHTML = `
        <button class="ic-btn" onclick="usePrompt('${safePrompt}')">
          ✨ Use this prompt
        </button>
        <button class="ic-btn" onclick="usePrompt('${safePrompt}');setTimeout(genImg,200)">
          ⚡ Generate now
        </button>
      `;
      // === END FIXED SECTION ===

      card.appendChild(ov);
    };
    setTimeout(()=>img.src=url,INSPIRE.indexOf(item)*1500);
  });
}

/* ... rest of your script remains unchanged ... */

function usePrompt(p){const ipt=document.getElementById('ipt');ipt.value=p;document.getElementById('ip').scrollTop=0;ipt.focus();ipt.select();ipt.style.background='#f0fdf8';setTimeout(()=>ipt.style.background='',1200);}
function selOpt(el){document.querySelectorAll('.ip-opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');selModel=el.dataset.model;el.style.transform='scale(0.95)';setTimeout(()=>el.style.transform='',150);}

/* ... remaining script functions ... */
</script>
