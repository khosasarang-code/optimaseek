<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OptimaSeek AI</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
  color: #111;
}
.app {
  display: flex;
  min-height: 100vh;
}
.sidebar {
  width: 260px;
  background: #f7f7f8;
  border-right: 1px solid #ddd;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.brand {
  font-size: 20px;
  font-weight: 700;
  padding: 12px 8px;
}
.side-btn {
  border: 0;
  background: transparent;
  padding: 12px;
  border-radius: 10px;
  text-align: left;
  cursor: pointer;
  font-size: 15px;
}
.side-btn:hover,
.side-btn.active {
  background: #ececf1;
}
.login-panel {
  margin-top: auto;
  border-top: 1px solid #ddd;
  padding-top: 16px;
  font-size: 14px;
}
.login-panel button,
.top-actions button,
.cookie-actions button {
  border: 1px solid #ccc;
  background: white;
  padding: 10px 16px;
  border-radius: 999px;
  cursor: pointer;
}
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.topbar {
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
}
.topbar h2 {
  margin: 0;
  font-size: 18px;
}
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 30px 18px 160px;
}
.welcome {
  text-align: center;
  margin-top: 16vh;
  font-size: 30px;
  font-weight: 400;
}
.messages {
  max-width: 780px;
  margin: 0 auto;
}
.message {
  padding: 14px 16px;
  margin: 12px 0;
  line-height: 1.5;
  white-space: pre-wrap;
}
.user {
  margin-left: auto;
  max-width: 75%;
  background: #f4f4f4;
  border-radius: 18px;
}
.assistant {
  max-width: 100%;
}
.composer-wrap {
  position: fixed;
  left: 260px;
  right: 0;
  bottom: 0;
  background: linear-gradient(transparent, #fff 25%);
  padding: 32px 18px 18px;
}
.composer {
  max-width: 780px;
  margin: 0 auto;
  border: 1px solid #ddd;
  border-radius: 28px;
  min-height: 58px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.08);
  background: white;
}
.icon-btn {
  width: 38px;
  height: 38px;
  border: 0;
  border-radius: 50%;
  background: #f1f1f1;
  cursor: pointer;
  font-size: 18px;
}
#prompt {
  flex: 1;
  border: 0;
  outline: 0;
  font-size: 16px;
  resize: none;
  min-height: 30px;
  max-height: 140px;
}
.send {
  background: #111;
  color: white;
}
.notice {
  text-align: center;
  color: #666;
  font-size: 12px;
  margin-top: 10px;
}
.cookie {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  background: white;
  border-top: 1px solid #ddd;
  padding: 16px;
  display: none;
  justify-content: space-between;
  gap: 20px;
  align-items: center;
  z-index: 5;
}
.cookie.show { display: flex; }
.cookie p { margin: 6px 0 0; color: #555; }
.black {
  background: #111 !important;
  color: white;
}
.mobile-menu {
  display: none;
}

@media (max-width: 760px) {
  .sidebar {
    position: fixed;
    inset: 0 auto 0 0;
    transform: translateX(-100%);
    transition: 0.25s;
    z-index: 10;
  }
  .sidebar.open { transform: translateX(0); }
  .mobile-menu { display: inline-block; }
  .composer-wrap { left: 0; }
  .welcome { font-size: 24px; margin-top: 12vh; }
  .cookie { flex-direction: column; align-items: flex-start; }
}
</style>
</head>

<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">OptimaSeek AI</div>
    <button class="side-btn active" onclick="newChat()">✎ New chat</button>
    <button class="side-btn" onclick="searchChats()">⌕ Search chats</button>
    <button class="side-btn" onclick="imageMode()">▧ Images</button>
    <button class="side-btn" onclick="alert('Plans page coming soon')">◇ See plans and pricing</button>
    <button class="side-btn" onclick="alert('Settings coming soon')">⚙ Settings</button>

    <div class="login-panel">
      <strong>Get responses tailored to you</strong>
      <p>Log in to save chats, create images, and upload files.</p>
      <button onclick="alert('Connect this to your login provider')">Log in</button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <button class="icon-btn mobile-menu" onclick="toggleSidebar()">☰</button>
        <h2 style="display:inline-block">OptimaSeek AI</h2>
      </div>
      <div class="top-actions">
        <button onclick="alert('Login setup needed')">Log in</button>
        <button onclick="alert('Signup setup needed')">Sign up for free</button>
      </div>
    </header>

    <section class="chat" id="chat">
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">Where should we begin?</div>
      </div>
    </section>

    <div class="composer-wrap">
      <div class="composer">
        <button class="icon-btn" onclick="document.getElementById('file').click()">+</button>
        <input id="file" type="file" hidden onchange="filePicked()" />
        <textarea id="prompt" placeholder="Ask anything" rows="1"></textarea>
        <button class="icon-btn" onclick="startVoice()">🎙</button>
        <button class="icon-btn send" onclick="sendMessage()">➜</button>
      </div>
      <div class="notice">OptimaSeek AI can make mistakes. Check important information.</div>
    </div>
  </main>
</div>

<div class="cookie" id="cookie">
  <div>
    <strong>We use cookies</strong>
    <p>Cookies help this site function, measure usage, and support marketing.</p>
  </div>
  <div class="cookie-actions">
    <button onclick="closeCookie()">Reject non-essential</button>
    <button class="black" onclick="closeCookie()">Accept all</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById("messages");
const promptEl = document.getElementById("prompt");
const welcomeEl = document.getElementById("welcome");
const cookieEl = document.getElementById("cookie");

let history = JSON.parse(localStorage.getItem("optimaseek_history") || "[]");

function saveHistory() {
  localStorage.setItem("optimaseek_history", JSON.stringify(history));
}

function addMessage(role, text) {
  if (welcomeEl) welcomeEl.style.display = "none";

  const div = document.createElement("div");
  div.className = "message " + role;
  div.textContent = text;
  messagesEl.appendChild(div);

  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
  return div;
}

async function sendMessage() {
  const text = promptEl.value.trim();
  if (!text) return;

  promptEl.value = "";
  addMessage("user", text);
  history.push({ role: "user", content: text });
  saveHistory();

  const loading = addMessage("assistant", "Thinking...");

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history })
    });

    const data = await res.json();
    const reply = data.reply || "Sorry, I could not get a response.";

    loading.textContent = reply;
    history.push({ role: "assistant", content: reply });
    saveHistory();
  } catch (err) {
    loading.textContent = "Connection error. Check your Vercel API function and API key.";
  }
}

function newChat() {
  history = [];
  saveHistory();
  messagesEl.innerHTML = '<div class="welcome" id="welcome">Where should we begin?</div>';
}

function searchChats() {
  const q = prompt("Search saved chat text:");
  if (!q) return;
  const found = history.filter(m => m.content.toLowerCase().includes(q.toLowerCase()));
  alert(found.length ? found.map(m => m.role + ": " + m.content).join("\n\n") : "No results found.");
}

function imageMode() {
  promptEl.value = "Create an image prompt for: ";
  promptEl.focus();
}

function filePicked() {
  const file = document.getElementById("file").files[0];
  if (file) addMessage("user", "Uploaded file: " + file.name);
}

function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert("Voice input is not supported in this browser.");
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = "en-US";
  rec.onresult = e => {
    promptEl.value = e.results[0][0].transcript;
  };
  rec.start();
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
}

function closeCookie() {
  localStorage.setItem("optimaseek_cookie", "closed");
  cookieEl.classList.remove("show");
}

promptEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

if (!localStorage.getItem("optimaseek_cookie")) {
  cookieEl.classList.add("show");
}
</script>
</body>
</html>
